<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Lit Kit — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet"/>
  <!--links for fonts and style sheet-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Junge&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/user-sign-in.css">
    <!---->
</head>
<body>
  <!-- logo at the top -->
  <header class="top-bar">
    <a href="#" class="logo">
      <span class="logo-text">The Lit Kit</span>
    </a>
  </header>

  <!-- left and right sections -->
  <div class="split">

    <!-- left side for the image -->
    <div class="split-left">[ IMAGE ]</div>

    <!-- right side has sign in form -->
    <div class="split-right">
      <div class="form-wrap">
        <h1 class="form-title">Sign In</h1>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" />
        </div>
        <a href="#" class="forgot">Forgot password?</a>

	<!-- submit button for signing in -->
        <button class="btn-signin">Sign in</button>
        <p class="create-account">Don't have an account? <a href="#">Create Account</a></p>
      </div>
    </div>

  </div>

</body>
</html>
